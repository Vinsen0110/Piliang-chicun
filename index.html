<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>月度收支记账</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f13;--card:#1a1a24;--card2:#22223a;--accent:#6c5ce7;--accent2:#a29bfe;
  --green:#00cec9;--red:#ff7675;--text:#e8e8f0;--text2:#8888a8;--border:#2d2d44;
  --shadow:0 8px 32px rgba(0,0,0,.4);
}
.light-mode{
  --bg:#f0f2f8;--card:#ffffff;--card2:#f5f6fa;--accent:#6c5ce7;--accent2:#5a4fcf;
  --green:#00a896;--red:#e55353;--text:#1a1a2e;--text2:#6b7280;--border:#dde1ec;
  --shadow:0 8px 32px rgba(0,0,0,.08);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.app{max-width:1100px;margin:0 auto;padding:20px 16px 40px}
.app-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
h1{font-size:1.6rem;font-weight:700}
.subtitle{color:var(--text2);font-size:.85rem;margin-bottom:24px}
.theme-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:12px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.theme-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}

/* Inputs & selects light mode fix */
.light-mode .form-group input,.light-mode .form-group select{background:var(--bg);color:var(--text);border-color:var(--border)}
.light-mode .chart-tabs,.light-mode .type-toggle{background:var(--bg)}
.light-mode .tx-list::-webkit-scrollbar-thumb{background:var(--border)}

/* Month Selector */
.month-bar{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.month-bar button{background:var(--card);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:.2s}
.month-bar button:hover{background:var(--accent);border-color:var(--accent)}
.month-label{font-size:1.1rem;font-weight:600;min-width:140px;text-align:center}

/* Summary Cards */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.summary-card{background:var(--card);border-radius:16px;padding:20px;position:relative;overflow:hidden;border:1px solid var(--border)}
.summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.summary-card.income::before{background:linear-gradient(90deg,var(--green),#55efc4)}
.summary-card.expense::before{background:linear-gradient(90deg,var(--red),#fab1a0)}
.summary-card.balance::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.summary-card .label{font-size:.78rem;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.summary-card .amount{font-size:1.5rem;font-weight:700}
.summary-card.income .amount{color:var(--green)}
.summary-card.expense .amount{color:var(--red)}
.summary-card.balance .amount{color:var(--accent2)}

/* Chart Area */
.chart-section{background:var(--card);border-radius:16px;padding:20px;margin-bottom:24px;border:1px solid var(--border)}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.chart-header h3{font-size:.95rem;font-weight:600}
.chart-tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:3px}
.chart-tabs button{background:none;border:none;color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.8rem;transition:.2s}
.chart-tabs button.active{background:var(--accent);color:#fff}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:160px;padding:10px 0}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-wrapper{display:flex;gap:3px;align-items:flex-end;height:130px;width:100%}
.bar{flex:1;border-radius:4px 4px 0 0;min-height:2px;transition:height .5s ease;position:relative;cursor:pointer}
.bar:hover{opacity:.8}
.bar.income-bar{background:linear-gradient(180deg,var(--green),rgba(0,206,201,.4))}
.bar.expense-bar{background:linear-gradient(180deg,var(--red),rgba(255,118,117,.4))}
.bar-label{font-size:.7rem;color:var(--text2)}
.bar-tooltip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:4px 8px;border-radius:6px;font-size:.7rem;white-space:nowrap;z-index:10}
.bar:hover .bar-tooltip{display:block}

/* Donut Chart */
.donut-container{display:flex;align-items:center;justify-content:center;gap:30px;min-height:160px}
.donut-svg{width:150px;height:150px}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:.8rem}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Add Entry */
.add-section{background:var(--card);border-radius:16px;padding:20px;margin-bottom:24px;border:1px solid var(--border)}
.add-section h3{font-size:.95rem;font-weight:600;margin-bottom:16px}
.type-toggle{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:16px;width:fit-content}
.type-toggle button{background:none;border:none;color:var(--text2);padding:8px 20px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:500;transition:.2s}
.type-toggle button.active-income{background:var(--green);color:#fff}
.type-toggle button.active-expense{background:var(--red);color:#fff}
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.form-group{flex:1 1 0;min-width:0}
.form-group label{display:block;font-size:.75rem;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:10px;font-size:.85rem;outline:none;transition:.2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group input[type="date"]{-webkit-appearance:none;appearance:none;min-width:0;max-width:100%}
.btn-add{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:10px 28px;border-radius:10px;cursor:pointer;font-size:.85rem;font-weight:600;transition:.2s;margin-top:4px}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(108,92,231,.4)}

/* Category Tags */
.cat-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cat-tag{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:20px;font-size:.75rem;cursor:pointer;transition:.2s}
.cat-tag:hover,.cat-tag.selected{border-color:var(--accent);color:var(--accent)}

/* Transaction List */
.list-section{background:var(--card);border-radius:16px;padding:20px;border:1px solid var(--border)}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.list-header h3{font-size:.95rem;font-weight:600}
.filter-chips{display:flex;gap:4px}
.filter-chip{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:20px;font-size:.72rem;cursor:pointer;transition:.2s}
.filter-chip:hover,.filter-chip.active{border-color:var(--accent);color:var(--accent)}
.tx-list{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto}
.tx-list::-webkit-scrollbar{width:4px}
.tx-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.tx-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card2);border-radius:12px;transition:.2s;cursor:default}
.tx-item:hover{background:var(--border)}
.tx-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.tx-icon.inc{background:rgba(0,206,201,.15)}
.tx-icon.exp{background:rgba(255,118,117,.15)}
.tx-info{flex:1;min-width:0}
.tx-info .tx-cat{font-size:.82rem;font-weight:500}
.tx-info .tx-note{font-size:.72rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-amount{font-weight:600;font-size:.9rem;flex-shrink:0}
.tx-amount.inc{color:var(--green)}
.tx-amount.exp{color:var(--red)}
.tx-date{font-size:.7rem;color:var(--text2);flex-shrink:0;min-width:44px;text-align:right}
.tx-del{background:none;border:none;color:var(--text2);cursor:pointer;font-size:.9rem;padding:4px;border-radius:6px;transition:.2s;flex-shrink:0}
.tx-del:hover{color:var(--red);background:rgba(255,118,117,.1)}
.empty-state{text-align:center;padding:40px;color:var(--text2);font-size:.85rem}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tx-item{animation:fadeIn .3s ease}

/* Responsive */
@media(max-width:768px){
  .summary{grid-template-columns:repeat(3,1fr)}
  .bar-chart{gap:3px}
  .bar-label{font-size:.62rem}
}
@media(max-width:520px){
  .app{padding:14px 12px 60px}
  h1{font-size:1.3rem}
  .summary{grid-template-columns:1fr}
  .summary-card{padding:14px 16px}
  .summary-card .amount{font-size:1.25rem}
  .form-row{flex-direction:column}
  .form-group{min-width:unset}
  .donut-container{flex-direction:column;gap:16px}
  .donut-svg{width:130px;height:130px}
  .chart-section,.add-section,.list-section{padding:14px}
  .month-label{font-size:.95rem;min-width:110px}
  .type-toggle button{padding:7px 14px;font-size:.8rem}
  .btn-add{width:100%;padding:12px}
  .form-group input,.form-group select{font-size:16px}
  .form-group input[type="date"]{display:block;width:100%;max-width:100%;padding-right:10px}
  .cat-tags{gap:5px}
  .cat-tag{padding:5px 10px;font-size:.72rem}
  .tx-item{padding:10px}
  .tx-icon{width:34px;height:34px;font-size:1rem}
  .filter-chips{gap:3px}
  .filter-chip{padding:4px 10px;font-size:.68rem}
  .list-header{flex-wrap:wrap;gap:8px}
  .bar-chart{height:130px;gap:2px}
  .bar-wrapper{height:100px}
}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1>💰 月度收支记账</h1>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">☀️</button>
  </div>
  <p class="subtitle">记录每一笔，掌控每一月</p>

  <!-- Month Selector -->
  <div class="month-bar">
    <button onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button onclick="changeMonth(1)">›</button>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="summary-card income">
      <div class="label">收入</div>
      <div class="amount" id="totalIncome">¥0.00</div>
    </div>
    <div class="summary-card expense">
      <div class="label">支出</div>
      <div class="amount" id="totalExpense">¥0.00</div>
    </div>
    <div class="summary-card balance">
      <div class="label">结余</div>
      <div class="amount" id="totalBalance">¥0.00</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-section">
    <div class="chart-header">
      <h3>📊 数据概览</h3>
      <div class="chart-tabs">
        <button class="active" onclick="switchChart('bar',this)">柱状图</button>
        <button onclick="switchChart('donut',this)">分类占比</button>
      </div>
    </div>
    <div id="barChart" class="bar-chart"></div>
    <div id="donutChart" class="donut-container" style="display:none"></div>
  </div>

  <!-- Add Entry -->
  <div class="add-section">
    <h3>➕ 添加记录</h3>
    <div class="type-toggle">
      <button class="active-expense" id="btnExpense" onclick="setType('expense')">支出</button>
      <button id="btnIncome" onclick="setType('income')">收入</button>
    </div>
    <div class="cat-tags" id="catTags"></div>
    <div class="form-row">
      <div class="form-group">
        <label>金额 (¥)</label>
        <input type="number" id="inputAmount" placeholder="0.00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>日期</label>
        <input type="date" id="inputDate">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>备注</label>
        <input type="text" id="inputNote" placeholder="备注（可选）" maxlength="50">
      </div>
    </div>
    <button class="btn-add" onclick="addEntry()">添加</button>
  </div>

  <!-- Transaction List -->
  <div class="list-section">
    <div class="list-header">
      <h3>📋 明细列表</h3>
      <div class="filter-chips">
        <div class="filter-chip active" onclick="setFilter('all',this)">全部</div>
        <div class="filter-chip" onclick="setFilter('income',this)">收入</div>
        <div class="filter-chip" onclick="setFilter('expense',this)">支出</div>
      </div>
    </div>
    <div class="tx-list" id="txList"></div>
  </div>
</div>

<script>
const CATS = {
  expense: [
    {name:'餐饮',icon:'🍜'},{name:'交通',icon:'🚗'},{name:'购物',icon:'🛒'},
    {name:'住房',icon:'🏠'},{name:'娱乐',icon:'🎮'},{name:'医疗',icon:'💊'},
    {name:'教育',icon:'📚'},{name:'通讯',icon:'📱'},{name:'服饰',icon:'👕'},
    {name:'其他',icon:'📦'}
  ],
  income: [
    {name:'工资',icon:'💼'},{name:'奖金',icon:'🎁'},{name:'投资',icon:'📈'},
    {name:'兼职',icon:'💻'},{name:'红包',icon:'🧧'},{name:'其他',icon:'💎'}
  ]
};
const DONUT_COLORS = ['#6c5ce7','#00cec9','#ff7675','#fdcb6e','#e17055','#74b9ff','#a29bfe','#55efc4','#fab1a0','#81ecec'];

let currentType = 'expense';
let currentCat = CATS.expense[0].name;
let currentFilter = 'all';
let currentMonth = new Date();
currentMonth.setDate(1);

let entries = JSON.parse(localStorage.getItem('finance_entries') || '[]');

function save(){ localStorage.setItem('finance_entries', JSON.stringify(entries)); }

function fmt(n){ return '¥' + Math.abs(n).toFixed(2); }

function getMonthEntries(){
  const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
  return entries.filter(e => {
    const d = new Date(e.date);
    return d.getFullYear() === y && d.getMonth() === m;
  }).sort((a,b) => new Date(b.date) - new Date(a.date));
}

function changeMonth(dir){
  currentMonth.setMonth(currentMonth.getMonth() + dir);
  render();
}

function setType(t){
  currentType = t;
  document.getElementById('btnExpense').className = t==='expense'?'active-expense':'';
  document.getElementById('btnIncome').className = t==='income'?'active-income':'';
  currentCat = CATS[t][0].name;
  renderCatTags();
}

function setFilter(f, el){
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderCatTags(){
  const c = document.getElementById('catTags');
  c.innerHTML = CATS[currentType].map(cat =>
    `<div class="cat-tag ${cat.name===currentCat?'selected':''}" onclick="pickCat('${cat.name}')">${cat.icon} ${cat.name}</div>`
  ).join('');
}

function pickCat(name){
  currentCat = name;
  renderCatTags();
}

function addEntry(){
  const amount = parseFloat(document.getElementById('inputAmount').value);
  if(!amount || amount <= 0) return;
  const date = document.getElementById('inputDate').value || new Date().toISOString().slice(0,10);
  const note = document.getElementById('inputNote').value.trim();
  const catObj = CATS[currentType].find(c=>c.name===currentCat);
  entries.push({
    id: Date.now(),
    type: currentType,
    category: currentCat,
    icon: catObj ? catObj.icon : '📦',
    amount,
    date,
    note
  });
  save();
  document.getElementById('inputAmount').value = '';
  document.getElementById('inputNote').value = '';
  render();
}

function delEntry(id){
  entries = entries.filter(e => e.id !== id);
  save();
  render();
}

function renderSummary(){
  const me = getMonthEntries();
  const inc = me.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const exp = me.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  document.getElementById('totalIncome').textContent = fmt(inc);
  document.getElementById('totalExpense').textContent = fmt(exp);
  document.getElementById('totalBalance').textContent = (inc-exp>=0?'¥':'-¥') + Math.abs(inc-exp).toFixed(2);
}

function renderBarChart(){
  const container = document.getElementById('barChart');
  const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  // Group by week
  const weeks = [];
  for(let w=0; w<Math.ceil(daysInMonth/7); w++){
    const start = w*7+1, end = Math.min((w+1)*7, daysInMonth);
    let inc=0, exp=0;
    entries.forEach(e=>{
      const d=new Date(e.date);
      if(d.getFullYear()===y && d.getMonth()===m){
        const day=d.getDate();
        if(day>=start && day<=end){
          if(e.type==='income') inc+=e.amount; else exp+=e.amount;
        }
      }
    });
    weeks.push({label:`${start}-${end}日`, inc, exp});
  }
  const maxVal = Math.max(1, ...weeks.map(w=>Math.max(w.inc,w.exp)));
  container.innerHTML = weeks.map(w=>`
    <div class="bar-group">
      <div class="bar-wrapper">
        <div class="bar income-bar" style="height:${(w.inc/maxVal)*120}px">
          <div class="bar-tooltip">收入 ${fmt(w.inc)}</div>
        </div>
        <div class="bar expense-bar" style="height:${(w.exp/maxVal)*120}px">
          <div class="bar-tooltip">支出 ${fmt(w.exp)}</div>
        </div>
      </div>
      <div class="bar-label">${w.label}</div>
    </div>
  `).join('');
}

function renderDonutChart(){
  const container = document.getElementById('donutChart');
  const me = getMonthEntries().filter(e=>e.type==='expense');
  const catMap = {};
  me.forEach(e=>{ catMap[e.category] = (catMap[e.category]||0) + e.amount; });
  const cats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const total = cats.reduce((s,c)=>s+c[1],0) || 1;

  if(cats.length === 0){
    container.innerHTML = '<div class="empty-state">暂无支出数据</div>';
    return;
  }

  let cumulative = 0;
  const arcs = cats.map((c,i) => {
    const pct = c[1]/total;
    const startAngle = cumulative * 2 * Math.PI - Math.PI/2;
    cumulative += pct;
    const endAngle = cumulative * 2 * Math.PI - Math.PI/2;
    const largeArc = pct > 0.5 ? 1 : 0;
    const r = 55, cx = 75, cy = 75;
    const x1 = cx + r*Math.cos(startAngle), y1 = cy + r*Math.sin(startAngle);
    const x2 = cx + r*Math.cos(endAngle), y2 = cy + r*Math.sin(endAngle);
    return `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} Z" fill="${DONUT_COLORS[i%DONUT_COLORS.length]}" opacity="0.85">
      <title>${c[0]}: ${fmt(c[1])} (${(pct*100).toFixed(1)}%)</title>
    </path>`;
  });

  const legend = cats.map((c,i) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${DONUT_COLORS[i%DONUT_COLORS.length]}"></div>${c[0]} ${fmt(c[1])} (${(c[1]/total*100).toFixed(1)}%)</div>`
  ).join('');

  container.innerHTML = `
    <svg class="donut-svg" viewBox="0 0 150 150">${arcs.join('')}
      <circle cx="75" cy="75" r="30" fill="var(--card)"/>
      <text x="75" y="72" text-anchor="middle" fill="var(--text2)" font-size="8">总支出</text>
      <text x="75" y="85" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">${fmt(total)}</text>
    </svg>
    <div class="donut-legend">${legend}</div>
  `;
}

function switchChart(type, btn){
  document.querySelectorAll('.chart-tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('barChart').style.display = type==='bar'?'flex':'none';
  document.getElementById('donutChart').style.display = type==='donut'?'flex':'none';
  if(type==='donut') renderDonutChart();
}

function renderList(){
  const list = document.getElementById('txList');
  let me = getMonthEntries();
  if(currentFilter !== 'all') me = me.filter(e=>e.type===currentFilter);
  if(me.length === 0){
    list.innerHTML = '<div class="empty-state">暂无记录，添加一笔吧 ✨</div>';
    return;
  }
  list.innerHTML = me.map(e => `
    <div class="tx-item">
      <div class="tx-icon ${e.type==='income'?'inc':'exp'}">${e.icon}</div>
      <div class="tx-info">
        <div class="tx-cat">${e.category}</div>
        <div class="tx-note">${e.note||'—'}</div>
      </div>
      <div class="tx-amount ${e.type==='income'?'inc':'exp'}">${e.type==='income'?'+':'-'}${fmt(e.amount)}</div>
      <div class="tx-date">${e.date.slice(5)}</div>
      <button class="tx-del" onclick="delEntry(${e.id})">✕</button>
    </div>
  `).join('');
}

function render(){
  const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
  document.getElementById('monthLabel').textContent = `${y}年${m+1}月`;
  document.getElementById('inputDate').value = new Date().toISOString().slice(0,10);
  renderSummary();
  renderBarChart();
  renderDonutChart();
  renderCatTags();
  renderList();
}

// Theme toggle
function toggleTheme(){
  const isLight = document.body.classList.toggle('light-mode');
  document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
  localStorage.setItem('finance_theme', isLight ? 'light' : 'dark');
}
// Restore saved theme
(function(){
  if(localStorage.getItem('finance_theme') === 'light'){
    document.body.classList.add('light-mode');
    document.getElementById('themeBtn').textContent = '🌙';
  }
})();

render();
</script>
</body>
</html>
